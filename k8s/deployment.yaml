apiVersion: apps/v1
kind: Deployment
metadata:
  name: jemena-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jemena-app
  template:
    metadata:
      labels:
        app: jemena-app
    spec:
      containers:
        - name: jemena-app
          image: pithvajignesh/jemena-camunda-poc:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: CAMUNDA_MODE
              value: "selfmanaged"
            - name: CAMUNDA_AUTH_METHOD
              value: "basic"
            - name: CAMUNDA_USERNAME
              value: "demo"
            - name: CAMUNDA_PASSWORD
              value: "demo"
            - name: ZEEBE_GRPC_ADDRESS
              value: "https://zeebe.jkk.18.139.248.5.nip.io"
            - name: ZEEBE_REST_ADDRESS
              value: "https://jkk.18.139.248.5.nip.io"
            - name: CAMUNDA_CLIENT_PREFERRESTOVERGRPC
              value: "false"
            - name: BROKER_URL
              value: "tcp://host.docker.internal:61616"
            - name: BROKER_USERNAME
              value: "artemis"
            - name: BROKER_PASSWORD
              value: "artemis"
            - name: ZEEBE_INSECURE_CONNECTION
              value: "true"